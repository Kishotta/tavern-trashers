<form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
  <div>
    <label for="name" class="block text-sm font-medium text-gray-700">Character Name</label>
    <input
      id="name"
      type="text"
      formControlName="name"
      placeholder="Enter character name"
      class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm px-3 py-2 border"
    />
    @if (form.get('name')?.invalid && form.get('name')?.touched) {
      <p class="mt-1 text-xs text-red-600">Name is required (max 100 characters).</p>
    }
  </div>

  <div>
    <label for="level" class="block text-sm font-medium text-gray-700">Level</label>
    <input
      id="level"
      type="number"
      formControlName="level"
      min="1"
      max="20"
      class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm px-3 py-2 border"
    />
    @if (form.get('level')?.invalid && form.get('level')?.touched) {
      <p class="mt-1 text-xs text-red-600">Level must be between 1 and 20.</p>
    }
  </div>

  <button
    type="submit"
    [disabled]="form.invalid"
    class="w-full inline-flex justify-center rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed"
  >
    Create Character
  </button>
</form>
